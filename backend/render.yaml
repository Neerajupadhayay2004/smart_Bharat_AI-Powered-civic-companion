services:
  - type: web
    name: smart-bharat-backend
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 4 -k uvicorn.workers.UvicornWorker app.main:app --bind 0.0.0.0:$PORT
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: false
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: smart-bharat-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: smart-bharat-redis
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false
      - key: CORS_ORIGINS
        value: https://your-netlify-app.netlify.app,http://localhost:5173,http://localhost:3000
      - key: TRUSTED_HOSTS
        value: .onrender.com,localhost,127.0.0.1
databases:
  - name: smart-bharat-db
    databaseName: smart_bharat
    user: smart_bharat
    plan: free
    ipAllowList: []
  - type: redis
    name: smart-bharat-redis
    ipAllowList: []
    plan: free
